services:
  db:
    image: postgres:16-alpine
    container_name: disruptlab_crm_db
    environment:
      POSTGRES_DB: disruptlab_crm
      POSTGRES_USER: disruptlab
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U disruptlab -d disruptlab_crm"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
